<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/cv.css">
    <title>CV</title>
</head>

<body>

    <!-- Header / Contact Info -->
    <nav class="navbar navbar-expand-lg nav-bg-custom py-3">
      <div class="container-fluid d-flex align-items-center justify-content-between">
        
        <!-- LADO IZQUIERDO: Tu logo -->
        <a class="navbar-brand ivan-logo-link m-0 p-0" href="#">
          <img src="/static/img/ivan_cloud_admin.png" alt="Ivan Lopez Cloud Support & Sysadmin">
        </a>
       
        <!-- LADO DERECHO: Contactos -->
        <div class="contact-header-container d-flex align-items-center">
          <div class="contact-column me-5">
            <span class="contact-label">Write Me</span>
            <a href="mailto:tu-correo@email.com" class="contact-value">tu-correo@email.com</a>
          </div>
          
          <div class="contact-column">
            <span class="contact-label">Call Me</span>
            <a href="tel:+12345678900" class="contact-value">+1 (234) 567 89 00</a>
          </div>
        </div>

      </div>
    </nav>

    <!-- Navigation Menu -->
    <nav class="navbar navbar-expand-lg nav-bg-custom border-bottom-custom">
      <div class="container-fluid d-flex justify-content-center">
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse flex-grow-0" id="navbarText">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-4">
            <li class="nav-item">
              <a class="nav-link active-custom" aria-current="page" href="#">About Me</a>
            </li>
            <li class="nav-item">
              <a class="nav-link nav-link-custom" href="#">Experience</a>
            </li>
            <li class="nav-item">
              <a class="nav-link nav-link-custom" href="#">Skills</a>
            </li>
            <li class="nav-item">
              <a class="nav-link nav-link-custom" href="#">Contact me</a>
            </li>
          </ul>
        </div>

      </div>
    </nav>

    <!-- Hero / Short Introduction -->
    <div class="container-fluid hero-section">
      <div class="container h-100">
        <div class="row align-items-center h-100">
          
          <!-- LADO IZQUIERDO: Texto -->
          <div class="col-md-6 text-start ps-md-5 hero-text-block">
            <h1 class="hero-title">
              Hello, I'm Ivan!
            </h1>
            <p class="hero-subtitle">
              Cloud Ops Engineer and infrastructure enthusiast —
            </p>
            <a href="#contacto" class="btn hero-btn">
              Contact Me
            </a>
          </div>
          
          <!-- LADO DERECHO: Imagen tipo Avatar Profesional -->
          <div class="col-md-6 d-flex align-items-center justify-content-center hero-img-container">
            <div class="hero-img-wrapper">
              <img src="/static/img/WhatsApp Image 2026-06-22 at 5.34.43 PM.jpeg" 
                   alt="Ivan Portrait" 
                   class="hero-img-avatar">
            </div>
          </div>

        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
